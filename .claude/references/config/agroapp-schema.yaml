  logs:
    ruta: /menu/logs
    descripcion: Auditoria de acciones del sistema
    servlet: Logs
    servicios:
      - getAllLogs
    filtros:
      desde: date (YYYY-MM-DD)
      hasta: date (YYYY-MM-DD)
    exporta: no

# ─────────────────────────────────────────────
# ENTIDAD CENTRAL: ANIMAL (deducida)
# ─────────────────────────────────────────────

animal_entity:
  descripcion: Entidad central del sistema — un bovino individual
  identificador_principal: diio (string — numero de arete/tag electrónico)
  campos_observados:
    # Identidad
    diio: string (identificador unico — puede cambiar via cambio_diio)
    diio_madre: string (FK a madre)
    padre: string
    abuelo: string
    origen: string
    # Clasificacion
    tipo_ganado_id: integer (FK)
    raza_id: integer (FK)
    fundo_id: integer (FK)
    # Fechas
    fecha_nacimiento: date
    fecha_creado: datetime
    ingreso: date (fecha de ingreso al sistema)
    # Estado
    estado_reproductivo_id: integer (FK)
    estado_leche: string/integer (en lactacion, seca, vaquillona, etc.)
    desecho: boolean (marcado para descarte)
    # Produccion lechera
    ultimo_control_leche: date
    ultimo_litros: decimal
    ultimo_rcs: decimal
    ultimo_grasa: decimal
    ultimo_proteina: decimal
    ultimo_urea: decimal
    promedio_litros: decimal
    promedio_rcs: decimal
    promedio_grasa: decimal
    promedio_proteina: decimal
    promedio_urea: decimal
    # Reproductivo
    dias_gestacion: integer
    proximo_parto: date
    ultimo_parto: date
    partos: integer
    ultima_ecografia: date
    ultima_inseminacion: date
    ultimo_inseminador: string
    toro: string
    total_ia: integer
    dias_en_leche: integer
    ultimo_secado: date
    dias_seca: integer
    # Pesaje
    ultimo_peso: decimal (kg)
    ultimo_pesaje: date
    # Agrupacion
    mangada: string (grupo/lote de animales)

# ─────────────────────────────────────────────
# MAPA DE EQUIVALENCIAS AgroApp → Schema Propio
# ─────────────────────────────────────────────

equivalencias:

  animal:
    agroapp_field: diio
    smartcow_field: tag_id (string — DIIO / EID)
    nota: DIIO es el termino chileno para el numero de arete electronico (EID)

  animal_group:
    agroapp_field: mangada
    smartcow_field: lote / grupo / paddock
    nota: "mangada" = grupo de animales manejados juntos

  fundo:
    agroapp_field: fundo_id / fundo
    smartcow_field: establecimiento / farm / predio

  estado_reproductivo:
    agroapp_field: estado_reproductivo
    smartcow_field: reproductive_status
    valores_comunes: [gestante, vacia, en_celo, descarte]

  estado_leche:
    agroapp_field: estado_leche
    smartcow_field: lactation_status
    valores_comunes: [en_ordeña, seca, vaquillona, ternera]

  desecho:
    agroapp_field: desecho (boolean)
    smartcow_field: flagged_for_cull / culling_flag
    nota: animales marcados para baja futura pero aun en el hato

  litros:
    agroapp_field: litros (control lechero)
    smartcow_field: milk_yield_liters
    frecuencia: por evento de control lechero (no diario)

  rcs:
    agroapp_field: rcs (recuento celular somatico)
    smartcow_field: somatic_cell_count (SCC)
    unidad: miles de celulas/ml

  ganancia_diaria:
    agroapp_field: ganancia periodo (kg/dia)
    smartcow_field: average_daily_gain (ADG)
    unidad: kg/dia

# ─────────────────────────────────────────────
# CAMPOS SIN EQUIVALENTE DIRECTO (nuevos en schema propio)
# ─────────────────────────────────────────────

campos_nuevos_sin_equivalente:
  - nombre: sensor_id
    descripcion: ID de sensor IoT (collar, bolus, podometro) — AgroApp no tiene sensores
    modulo: animal

  - nombre: gps_location
    descripcion: Ubicacion GPS del animal — no existe en AgroApp
    modulo: animal

  - nombre: health_alert
    descripcion: Alertas automaticas de salud por sensor — no existe en AgroApp
    modulo: alertas

  - nombre: feeding_record
    descripcion: Registro de consumo de alimento individual — AgroApp no lo registra
    modulo: nutricion

  - nombre: body_condition_score
    descripcion: Score de condicion corporal (BCS 1-5) — no registrado en AgroApp
    modulo: animal

  - nombre: genetic_index
    descripcion: Indices geneticos (DEP, IPG) — AgroApp solo registra padre/abuelo
    modulo: animal

  - nombre: milking_frequency
    descripcion: Frecuencia de ordena (1x, 2x, 3x dia) — AgroApp no distingue
    modulo: leche

  - nombre: quarter_data
    descripcion: Datos por cuarto (mastitis individual por cuarto) — no existe en AgroApp
    modulo: salud

# ─────────────────────────────────────────────
# PLAN DE MIGRACION DE DATOS
# ─────────────────────────────────────────────

plan_migracion:

  prioridad_1_core:
    descripcion: Datos que se deben migrar primero (entidades base)
    tablas:
      - fundo → establecimiento
      - usuario → user
      - tipo_ganado → categoria_animal
      - raza → raza
      - estado_reproductivo → estado_reproductivo
      - inseminacion_semen → toro / material_genetico
    fuente: APIs getAllXxx sin filtros (catalogs)
    metodo: GET requests a cada servlet con usuario/clave

  prioridad_2_animales:
    descripcion: Hato actual (animales vivos)
    servlet: GanadoActual
    servicio: getGanadoActual
    params_recomendados:
      fundo_id: 0 (todos los fundos)
      cbInventario: true
      cbFechaNacimiento: true
      cbTipoGanado: true
      cbRaza: true
      cbFundo: true
      cbEstadoReproductivo: true
      cbEstadoLeche: true
      cbDesecho: true
      cbDiioMadre: true
      cbPadre: true
      cbAbuelo: true
      cbOrigen: true
      cbFechaCreado: true
    nota: paginar con order=diio

  prioridad_3_historial_reproductivo:
    descripcion: Historial de eventos reproductivos
    modulos:
      - inseminaciones (desde 2020 a hoy)
      - ecografias
      - partos
      - pre_partos
      - revisiones_post_parto
      - estimulacion_celo
      - secados
    params: desde=2020-01-01, hasta=hoy, todos los fundos

  prioridad_4_historial_productivo:
    descripcion: Historial productivo
    modulos:
      - leche_historial (todos los controles)
      - pesajes
    params: desde=2018-01-01, hasta=hoy

  prioridad_5_movimientos:
    descripcion: Movimientos de animales
    modulos:
      - areteo_alta
      - areteo_aparicion
      - areteo_cambio_diio
      - bajas
      - traslados
      - ventas
      - inventarios
    nota: importante para reconstruir historia del hato

  prioridad_6_stock:
    descripcion: Stock de insumos
    modulos:
      - stock_semen
      - stock_series (medicamentos)
    nota: no critico para MVP

  advertencias:
    - AgroApp usa autenticacion por usuario/clave en query params — NO usar en produccion sin HTTPS
    - Las fechas estan en formato YYYY-MM-DD
    - Los IDs son integers sin UUID — requieren mapeo al insertar en schema nuevo
    - "desecho=true" significa animal aun en el hato pero marcado para descarte — no confundir con baja
    - "mangada" no tiene ID — es un string libre (nombre del grupo)
    - El DIIO puede cambiar (ver modulo cambio_diio) — usar areteo_cambio_diio para trazabilidad
    - Modulos lazy-loaded (ecografia, estimulacion, inseminacion, desecho, secado, revisionpp, tratamiento) necesitan verificacion en campo para confirmar campos exactos del API
