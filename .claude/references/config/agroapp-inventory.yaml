    estado: importado_indirecto
    rows_prod: 1429  # animales con estado='baja'
    tabla_bajas_vacia: true  # by design — el script no inserta en tabla `bajas`
    rango: "2018+ (inferido por fechas de baja)"
    notas: |
      El script marca animales.estado='baja' en vez de insertar en tabla `bajas`.
      La tabla `bajas` existe pero está sin uso (posible tech debt).
    gap_reportado_jp: null

  - modulo: ventas
    tabla_smartcow: ventas
    etl: src/etl/import-ventas-detalle.ts  # requiere AgroApp API
    estado: bloqueado
    rows_prod: 0
    rango: null
    blocker: |
      AGROAPP_PASSWORD no está en prod /var/www/smartcow/.env
      import-ventas-detalle.ts fetcha detalle por rampa desde API con auth básica.
      El Excel de export (Ventas_Historial_*.xlsx) tiene 846 ventas agregadas
      pero sin DIIO por rampa → import-agroapp-excel.ts hace early-exit.
    gap_reportado_jp: |
      "Faltan ventas" — confirmado. Hoy tabla `ventas` está vacía.
      Fix: setear AGROAPP_PASSWORD y correr import-ventas-detalle.ts.
      Output esperado: ~15-20k animales vendidos (846 ventas × ~20 animales/rampa).
    siguiente: AUT-XXX (setear credenciales + correr ETL)

  - modulo: traslados
    tabla_smartcow: traslados
    etl: null  # sin ETL implementado
    estado: no_implementado
    rows_prod: 0
    rango: null
    blocker: |
      import-agroapp-excel.ts tiene early-exit explícito:
      "Traslados son agregados por lote (sin DIIO) — no importar en tabla traslados"
      El Excel exportado (Traslados_Historial_*.xlsx) tiene agregados por lote;
      la tabla `traslados` espera un row por animal (con animal_id).
    gap_reportado_jp: null
    siguiente: |
      Decisión producto: (a) escribir ETL que mapee lotes a animales individuales,
      (b) cambiar schema de `traslados` a agregado por lote, o (c) dejar vacío.

