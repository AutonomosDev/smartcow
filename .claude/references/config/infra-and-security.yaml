    upstream: nginx → app:3000
  langfuse.smartcow.cl:
    target: 2.24.204.73
    upstream: nginx → langfuse-web:3000
  staging.smartcow.cl:
    target: 2.24.204.73
    upstream: nginx → app-staging:3000
    estado: activo (DNS + cert OK)

