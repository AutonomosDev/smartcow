# ─────────────────────────────────────────────────────────────
# Seguridad — hardening aplicado 2026-04-22
# ─────────────────────────────────────────────────────────────
security:
  firewall:
    provider: hostinger (hypervisor level)
    id: 268254
    name: smartcow-firewall
    synced: true
    rules:
      - port: 22
        proto: tcp (SSH)
        source: any
      - port: 80
        proto: tcp (HTTP)
        source: any
      - port: 443
        proto: tcp (HTTPS)
        source: any
    # TODOS los demás puertos cerrados a internet.
    # Los puertos 3000/3001/5433 NUNCA deben estar en 0.0.0.0 (ver docker-compose).
  ssh:
    config_file: /etc/ssh/sshd_config.d/99-hardening.conf
    permit_root_login: prohibit-password
    password_authentication: "no"
    max_auth_tries: 3
    login_grace_time: 30
    authorized_keys: /root/.ssh/authorized_keys (2 keys)
  fail2ban:
    installed: true
    enabled: true
    config: /etc/fail2ban/jail.local
    jails:
      - name: sshd
        maxretry: 5
        findtime: 10m
        bantime: 1h
  ssl:
    provider: letsencrypt (certbot)
    auto_renew: true
    certs:
      - domains: [smartcow.cl, www.smartcow.cl]
      - domains: [langfuse.smartcow.cl]
      - domains: [staging.smartcow.cl]
  secrets:
    storage: /var/www/smartcow/.env (perms 600, owner root)
    nunca_committear:
      - .env
      - .env.backup-*
      - .claude/settings.local.json   # tuvo key leak 2026-04-22, ya en gitignore
    rotaciones_pendientes:
      # Siguen con defaults del docker-compose (changeme). Solo accesibles
      # desde red interna docker, pero higiene.
      - LANGFUSE_REDIS_AUTH
      - CLICKHOUSE_PASSWORD
      - MINIO_ROOT_PASSWORD
      - LANGFUSE_SALT
      - LANGFUSE_ENCRYPTION_KEY
  backups:
    postgres_prod:
      script: /usr/local/bin/smartcow-pg-backup.sh
      destination: /var/backups/smartcow-postgres/
      schedule_cron: "15 3 * * *"          # 03:15 UTC ≈ 00:15 CLT
      retention_days: 7
      format: pg_dump --clean --if-exists | gzip -9
      log: /var/log/smartcow-backup.log
      off_site: pendiente (recomendado: sync a S3/R2/B2)
    hostinger_snapshots:
      retention: 1 snapshot rotativo (auto)
  waf: ninguno (no Cloudflare, no WAF aplicativo)
  rate_limiting:
    ssh: fail2ban (via sshd jail)
    chat_api: redis-based (app nivel)
    sso_brute: NextAuth no expone bruteforce por credentials (bcrypt 10 rounds)

# ─────────────────────────────────────────────────────────────
# Deploy
# ─────────────────────────────────────────────────────────────
deploy:
  script: ./deploy.sh
  requirements:
    - ssh alias smartcow-vps configurado
    - /var/www/smartcow es clone git de AutonomosDev/smartcow
    - /var/www/smartcow/.env presente con todos los secrets
  steps:
    - git pull origin main
    - docker compose build app
    - docker compose up -d
  migrate_mode: ./deploy.sh --migrate  # usa stage "migrate" del Dockerfile
  manual_migrate_fallback: docker compose run --rm --profile migrate migrate
  db_tracking_sync: docker compose exec -T app npx tsx scripts/sync-drizzle-tracking.ts
  ci_cd: push a main → deploy manual via ./deploy.sh (no GitHub Actions)
  gotchas:
    migrate_cache:
      sintoma: >
        deploy.sh --migrate corre, dice "migrations applied successfully"
        pero las tablas/columnas nuevas no aparecen en prod y
        drizzle.__drizzle_migrations sigue en el mismo count.
      causa: >
        Docker layer cache de "COPY src/db ./src/db" no invalida cuando
        solo cambia el CONTENIDO de archivos existentes (ej. SQL nuevo).
        El stage migrate se construye con la capa cached → Drizzle ve
        las migraciones viejas y no aplica nada.
      fix: |
        # 1. Reconstruir imagen migrate sin cache
        ssh smartcow-vps
        cd /var/www/smartcow
        docker compose build --no-cache migrate
        docker compose --profile migrate run --rm migrate

        # 2. Si el runner dice "applied" pero aún no hay cambios en DB,
        #    aplicar SQL directamente y sincronizar tracking:
        for f in <tag>.sql; do
          cat src/db/migrations/$f | sed 's/--> statement-breakpoint//g' \
            | docker compose exec -T db psql -U smartcow -d smartcow
        done
        # Luego insertar registros en drizzle.__drizzle_migrations:
        # hash = SHA-256 del contenido del archivo (Node.js crypto.createHash)
        # when = entry.when del meta/_journal.json
        # INSERT INTO drizzle.__drizzle_migrations (hash, created_at) VALUES (...)
      detectado: 2026-04-27
      ticket: AUT (sin ticket — documentado aquí)

