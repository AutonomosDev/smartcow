# infra-and-security.yaml — fuente de verdad de infraestructura y seguridad
# Última actualización: 2026-04-22 (post GCP clean sweep + security hardening)
#
# Regla: SIEMPRE leer este archivo antes de afirmar cosas sobre infra, VPS,
# secrets, seguridad o deploy. El CLAUDE.md es resumen humano; este YAML es
# el contrato máquina.

version: 2

# ─────────────────────────────────────────────────────────────
# VPS — Hostinger (único servidor, todo self-hosted)
# ─────────────────────────────────────────────────────────────
vps:
  provider: hostinger
  id: 1591599
  hostname: srv1591599.hstgr.cloud
  ipv4: 2.24.204.73
  ipv6: 2a02:4780:75:66b4::1
  ptr: smartcow.cl
  plan: KVM 2
  specs:
    cpus: 2
    memory_gb: 8
    disk_gb: 100
    bandwidth_gb: 8000
  datacenter_id: 24
  os: Ubuntu 24.04 (template Docker oficial Hostinger)
  ssh_alias: smartcow-vps    # ~/.ssh/config → User=root, Key=~/.ssh/smartcow_vps

# ─────────────────────────────────────────────────────────────
# Docker containers en el VPS (docker compose)
# ─────────────────────────────────────────────────────────────
containers:
  prod:
    app:
      image: build desde ./Dockerfile (Next.js standalone)
      port_binding: 127.0.0.1:3000 → 3000   # loopback: solo nginx accede
      container: smartcow-app-1
    db:
      image: postgres:16-alpine
      port_binding: internal only (no publish)
      volume: postgres_data
      container: smartcow-db-1
    redis:
      image: redis:7-alpine
      port_binding: internal only
      container: smartcow-redis-1
      uso: rate limiting app

  staging:
    app:
      port_binding: 127.0.0.1:3001 → 3000   # loopback
      container: smartcow-app-staging
    db:
      port_binding: 127.0.0.1:5433 → 5432   # loopback (ssh -L para conectarse)
      container: smartcow-db-staging
    redis:
      port_binding: internal only
      container: smartcow-redis-staging

  langfuse:
    web:
      domain: langfuse.smartcow.cl
      container: smartcow-langfuse-web-1
    worker:
      container: smartcow-langfuse-worker-1
    clickhouse:
      container: smartcow-clickhouse-1
      volume: clickhouse_data
    redis:
      container: smartcow-redis-langfuse-1
      auth: requerido (LANGFUSE_REDIS_AUTH)
    minio:
      container: smartcow-minio-1
      volume: minio_data
      uso: S3-compatible para event sourcing + media uploads langfuse

  proxy:
    nginx:
      image: nginx:alpine
      port_binding: 0.0.0.0:80, 0.0.0.0:443
      container: smartcow-nginx-1
      certs: /etc/letsencrypt (certbot auto-renew)

# ─────────────────────────────────────────────────────────────
# DNS / Dominios
# Registrar/DNS: GoDaddy (NS: ns53/ns54.domaincontrol.com)
# Server target: Hostinger VPS 2.24.204.73
# NOTA: el dominio está en GoDaddy, no en Hostinger. Para cambios
# de records usar GoDaddy console o su API (no hay MCP GoDaddy
# conectado actualmente).
# ─────────────────────────────────────────────────────────────
