<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ic{width:44px;height:44px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center}
.ic.dark{background:#1e3a2f}.ic.dark svg{color:#7ecfa0}
.ic svg{width:20px;height:20px;color:#1a1a1a;stroke-width:1.8}
.n{font-size:10px;color:#888;margin-top:5px;text-align:center}
.u{display:flex;flex-direction:column;align-items:center}
.sp{font-size:10px;color:#bbb;margin-top:6px}
</style>
<div class="pv">
  <div class="row">
    <div class="u"><div class="ic"><i data-lucide="bell"></i></div><div class="n">bell</div></div>
    <div class="u"><div class="ic"><i data-lucide="chevron-left"></i></div><div class="n">chevron-left</div></div>
    <div class="u"><div class="ic"><i data-lucide="map"></i></div><div class="n">map</div></div>
    <div class="u"><div class="ic"><i data-lucide="sparkles"></i></div><div class="n">sparkles</div></div>
    <div class="u"><div class="ic dark"><i data-lucide="cow"></i></div><div class="n">cow</div></div>
    <div class="u"><div class="ic"><i data-lucide="scan-line"></i></div><div class="n">scan-line</div></div>
    <div class="u"><div class="ic"><i data-lucide="syringe"></i></div><div class="n">syringe</div></div>
    <div class="u"><div class="ic"><i data-lucide="scale"></i></div><div class="n">scale</div></div>
  </div>
  <div class="sp">Lucide icons · 1.8 stroke · rounded linecaps · 20px at 44×44 container</div>
</div>
<script>lucide.createIcons();</script>
