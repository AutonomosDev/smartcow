<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.only{background:#fff;border:1.5px solid #1e3a2f;border-radius:8px;width:120px;height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.val{font-size:34px;font-weight:600;color:#1e3a2f;letter-spacing:-1px;font-feature-settings:"tnum"}
.unit{font-size:14px;font-weight:500;color:#1e3a2f;margin-left:2px}
.side{flex:1;display:flex;flex-direction:column;gap:8px}
.title{font-size:14px;font-weight:600;color:#1a1a1a}
.sub{font-size:11px;color:#555;line-height:1.5}
.rule{background:#e6f3ec;border-radius:8px;padding:8px 10px;font-size:10px;color:#1e3a2f;font-weight:500;line-height:1.4}
.banned{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.b{background:#fff;border:1px solid #ebe9e3;color:#bbb;border-radius:4px;padding:4px 8px;font-size:10px;font-weight:500;text-decoration:line-through;text-decoration-color:#c0392b;text-decoration-thickness:1.5px;position:relative}
.b.r12{border-radius:12px}.b.r14{border-radius:14px}.b.r16{border-radius:16px}.b.r20{border-radius:20px}.b.rp{border-radius:9999px}
</style>
<div class="pv" style="display:flex;flex-direction:row;gap:18px;align-items:center">
  <div class="only">
    <div class="val">8</div><div class="unit">px</div>
  </div>
  <div class="side">
    <div class="title">Radius único · 8 px</div>
    <div class="sub">Un solo radio para todo: cards, botones, chips, hero, inputs, iconos. Si algo necesita ser circular (avatar, dot), usar <code>border-radius: 50%</code>. Nada más.</div>
    <div class="rule">Regla: <b>border-radius: 8px</b> en toda la app. Sin excepciones.</div>
    <div class="sub" style="color:#c0392b;margin-top:4px"><b>Prohibidos</b> (antiguo sistema):</div>
    <div class="banned">
      <div class="b r12">12</div>
      <div class="b r14">14</div>
      <div class="b r16">16</div>
      <div class="b r20">20</div>
      <div class="b rp">pill</div>
    </div>
  </div>
</div>
