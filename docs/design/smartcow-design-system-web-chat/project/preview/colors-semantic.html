<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.sw{width:108px;height:80px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
.sw-name{font-size:11px;font-weight:600;color:#fff}
.sw-hex{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;font-feature-settings:"tnum"}
</style>
<div class="pv pv-row">
  <div class="sw" style="background:#e74c3c"><div class="sw-name">danger</div><div class="sw-hex">#e74c3c</div></div>
  <div class="sw" style="background:#f39c12"><div class="sw-name">warning</div><div class="sw-hex">#f39c12</div></div>
  <div class="sw" style="background:#1a5276"><div class="sw-name">info</div><div class="sw-hex">#1a5276</div></div>
  <div class="sw" style="background:#1e3a2f"><div class="sw-name">ok</div><div class="sw-hex">#1e3a2f</div></div>
</div>
