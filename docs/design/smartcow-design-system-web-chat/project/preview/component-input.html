<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.bar{background:#f8f6f1;border-top:.5px solid #ebe9e3;padding:10px 14px 14px;max-width:420px;display:flex;flex-direction:column;gap:9px}
/* suggestion chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:1px}
.chip{background:#fff;border:.5px solid #e0ddd8;border-radius:8px;padding:6px 11px;font-size:11px;color:#1a1a1a;white-space:nowrap;font-weight:500}
/* composer */
.pill{background:#fff;border:.5px solid #e0ddd8;border-radius:8px;padding:10px 10px 10px 14px;display:flex;align-items:center;gap:8px;min-height:52px}
.input{flex:1;font-size:13px;color:#aaa;padding:3px 0}
.ico{width:32px;height:32px;border-radius:50%;background:#ebe9e3;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.ico svg{color:#1a1a1a}
.send{width:36px;height:36px;border-radius:50%;background:#1e3a2f;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send svg{color:#fff}
.note{font-size:10px;color:#bbb;margin-top:4px;line-height:1.5}
</style>
<div class="pv">
  <div class="bar">
    <div class="chips">
      <div class="chip">Lote Central</div>
      <div class="chip">Costos semana</div>
      <div class="chip">Proyección faena</div>
      <div class="chip">Silos</div>
    </div>
    <div class="pill">
      <div class="ico" title="Adjuntar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11l-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-9 9a2 2 0 1 1-3-3l8-8"/></svg>
      </div>
      <div class="input">Escribe a SmartCow…</div>
      <div class="ico" title="Web">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg>
      </div>
      <div class="ico" title="Voz">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
      </div>
      <div class="send" title="Enviar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </div>
    </div>
  </div>
  <div class="note">Composer · chips sugeridos arriba · pill 52px min · iconos 32 (adjuntar/web/voz) + send 36px verde bosque · todos Lucide 1.8 stroke</div>
</div>
