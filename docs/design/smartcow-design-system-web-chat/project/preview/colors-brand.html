<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.sw{width:108px;height:86px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
.sw-name{font-size:11px;font-weight:600;color:#fff}
.sw-hex{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;font-feature-settings:"tnum"}
.sw.dark .sw-name{color:#fff}
.sw.light .sw-name{color:#1a1a1a}.sw.light .sw-hex{color:#888}
</style>
<div class="pv pv-row">
  <div class="sw dark"  style="background:#1e3a2f"><div class="sw-name">primary</div><div class="sw-hex">#1e3a2f</div></div>
  <div class="sw light" style="background:#7ecfa0"><div class="sw-name" style="color:#0f2a20">accent</div><div class="sw-hex" style="color:rgba(15,42,32,.6)">#7ecfa0 · mint</div></div>
  <div class="sw light" style="background:#f8f6f1;border:1px solid #ebe9e3"><div class="sw-name">bg</div><div class="sw-hex">#f8f6f1</div></div>
  <div class="sw light" style="background:#ffffff;border:1px solid #ebe9e3"><div class="sw-name">card</div><div class="sw-hex">#ffffff</div></div>
  <div class="sw light" style="background:#ebe9e3"><div class="sw-name">cream</div><div class="sw-hex">#ebe9e3</div></div>
</div>
