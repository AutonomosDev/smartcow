<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body{padding:0;background:#f8f6f1}
.wrap{padding:16px;display:flex;gap:14px;align-items:stretch}
.ph{width:160px;height:200px;border-radius:18px;overflow:hidden;position:relative;background:#000;flex-shrink:0}
.ph img{width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:brightness(1.22) saturate(1.08) contrast(1.02)}
.ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,18,10,.78) 0%,rgba(5,18,10,.28) 55%,transparent 100%)}
.meta{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 0;gap:3px}
.meta .t{font-size:12px;font-weight:600;color:#1a1a1a}
.meta .s{font-size:11px;color:#888;line-height:1.5}
</style>
<div class="wrap">
  <div class="ph">
    <img src="../assets/hero_cows.jpg" alt="">
    <div class="ov"></div>
  </div>
  <div class="meta">
    <div class="t">Hero imagery</div>
    <div class="s">Warm, naturalistic. Angus herd at overcast dusk in Los Lagos foothills. Shallow DOF, desaturated green-tinted.</div>
    <div class="s" style="color:#bbb;margin-top:4px">Brillo +22% · saturación +8% · contraste +2%.<br>Gradient overlay suavizado: rgba(5,18,10,.78 → transparent).<br>No illustration, no stock-corporate imagery.</div>
  </div>
</div>
