# GitHub Actions — smartcow
# Quality gates: typecheck + tests on PRs and pushes to main
# Deployment: SSH + git pull + docker compose on Hostinger VPS (push to main only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy (git pull + rebuild + restart)
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s << 'EOF'
            set -euo pipefail
            cd /var/www/smartcow
            echo "→ git pull"
            git pull origin main
            echo "→ docker build"
            docker compose build app
            echo "→ docker up"
            docker compose up -d app
            echo "→ health"
            sleep 3
            docker compose ps
          EOF

      - name: Smoke test
        run: |
          sleep 5
          code=$(curl -sSo /dev/null -w "%{http_code}" https://smartcow.cl/login)
          echo "smartcow.cl/login → $code"
          [ "$code" = "200" ] || exit 1
