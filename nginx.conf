events { worker_connections 1024; }

http {
    # Redirect HTTP → HTTPS (prod + staging + langfuse)
    server {
        listen 80;
        server_name smartcow.cl www.smartcow.cl langfuse.smartcow.cl;
        return 301 https://$host$request_uri;
    }

    # Producción
    server {
        listen 443 ssl;
        server_name smartcow.cl www.smartcow.cl;

        ssl_certificate /etc/letsencrypt/live/smartcow.cl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smartcow.cl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

    # Langfuse — observability UI (AUT-278)
    server {
        listen 443 ssl;
        server_name langfuse.smartcow.cl;

        ssl_certificate /etc/letsencrypt/live/langfuse.smartcow.cl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/langfuse.smartcow.cl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 50M;

        location / {
            proxy_pass http://langfuse-web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

