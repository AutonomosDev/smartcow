# docker-compose.staging.yml — AUT-286
# Staging stack isolated from prod: puerto 3001 (app), 5433 (db), volumen separado.
# Reutiliza red smartcow_default para compartir langfuse/nginx con prod.
#
# Deploy:
#   docker compose -f docker-compose.staging.yml up -d
#
# Primer seed desde prod:
#   scripts/sync-staging-from-prod.sh
#
# Ver AUT-286 para DNS/cert/firewall manual steps.

services:
  app-staging:
    build: .
    container_name: smartcow-app-staging
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgres://smartcow:${POSTGRES_PASSWORD_STAGING}@db-staging:5432/smartcow
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET_STAGING}
      - AUTH_SECRET=${NEXTAUTH_SECRET_STAGING}
      - NEXTAUTH_URL=${NEXTAUTH_URL_STAGING:-https://staging.smartcow.cl}
      - AUTH_TRUST_HOST=true
      - REDIS_URL=redis://redis-staging:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGROAPP_USER=${AGROAPP_USER}
      - AGROAPP_PASSWORD=${AGROAPP_PASSWORD}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse-web:3000}
      - NODE_ENV=production
      - NEXT_PUBLIC_ENV=staging
    depends_on:
      db-staging:
        condition: service_healthy
      redis-staging:
        condition: service_started
    restart: always
    networks:
      - default
      - smartcow_default

  migrate-staging:
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URL=postgres://smartcow:${POSTGRES_PASSWORD_STAGING}@db-staging:5432/smartcow
    depends_on:
      db-staging:
        condition: service_healthy
    profiles:
      - migrate

  db-staging:
    image: postgres:16-alpine
    container_name: smartcow-db-staging
    ports:
      - "5433:5432"  # expuesto solo local, firewall debe bloquear externo
    environment:
      - POSTGRES_USER=smartcow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_STAGING}
      - POSTGRES_DB=smartcow
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis-staging:
    image: redis:7-alpine
    container_name: smartcow-redis-staging
    volumes:
      - redis_staging_data:/data
    restart: always

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  smartcow_default:
    external: true
    name: smartcow_default
