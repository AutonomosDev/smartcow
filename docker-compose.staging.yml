services:
  app-staging:
    build: .
    container_name: smartcow-app-staging
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL_STAGING}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET_STAGING}
      - AUTH_SECRET=${NEXTAUTH_SECRET_STAGING}
      - NEXTAUTH_URL=${NEXTAUTH_URL_STAGING:-https://staging.smartcow.cl}
      - AUTH_TRUST_HOST=true
      - REDIS_URL=redis://redis-staging:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGROAPP_USER=${AGROAPP_USER}
      - AGROAPP_PASSWORD=${AGROAPP_PASSWORD}
      - NODE_ENV=production
      - NEXT_PUBLIC_ENV=staging
    depends_on:
      - redis-staging
    restart: always
    networks:
      - default
      - smartcow_default

  redis-staging:
    image: redis:7-alpine
    container_name: smartcow-redis-staging
    volumes:
      - redis_staging_data:/data
    restart: always

volumes:
  redis_staging_data:

networks:
  smartcow_default:
    external: true
    name: smartcow_default
