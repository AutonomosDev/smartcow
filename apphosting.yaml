# Firebase App Hosting — smartcow
# Docs: https://firebase.google.com/docs/app-hosting/configure
# Firebase project: smartcow-493015
# GCP secrets project: smartcow-493015

# Cloud Run runtime settings (managed by Firebase App Hosting)
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets
env:
  # ── Database ──
  - variable: DATABASE_URL
    secret: projects/smartcow-493015/secrets/database-url

  # ── OpenRouter (Gemma 4 / AI chat) ──
  - variable: OPENROUTER_API_KEY
    secret: projects/smartcow-493015/secrets/openrouter-api-key

  # ── AgroApp ──
  - variable: AGROAPP_USER
    secret: projects/smartcow-493015/secrets/agroapp-user
  - variable: AGROAPP_PASSWORD
    secret: projects/smartcow-493015/secrets/agroapp-password

  # ── Firebase Admin SDK ──
  - variable: FIREBASE_CLIENT_EMAIL
    secret: projects/smartcow-493015/secrets/firebase-client-email
  - variable: FIREBASE_PRIVATE_KEY
    secret: projects/smartcow-493015/secrets/firebase-private-key

  # ── Observabilidad ──
  - variable: SENTRY_DSN
    secret: projects/smartcow-493015/secrets/sentry-dsn-web

  # ── GCP ──
  - variable: GCP_PROJECT_ID
    value: smartcow-493015

  # ── Firebase Client SDK (públicas, browser-safe) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyA35gHtCQFid_jqYjeSgoezdZTtanKwSxA
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: smartcow-493015.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: smartcow-493015
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "376220159781"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:376220159781:web:637923fa796263cf7a14cc"
    availability:
      - BUILD
      - RUNTIME
