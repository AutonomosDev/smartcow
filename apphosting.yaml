# Firebase App Hosting — smartcow
# Docs: https://firebase.google.com/docs/app-hosting/configure
# Firebase project: smartcow-c22fb
# Secrets: todos en smartcow-c22fb (mismo proyecto)

# Cloud Run runtime settings (managed by Firebase App Hosting)
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets
env:
  # ── Database ──
  - variable: DATABASE_URL
    secret: projects/smartcow-c22fb/secrets/database-url

  # ── Google AI (Gemini / chat) ──
  - variable: GOOGLE_API_KEY
    secret: projects/smartcow-c22fb/secrets/google-api-key

  # ── AgroApp ──
  - variable: AGROAPP_USER
    secret: projects/smartcow-c22fb/secrets/agroapp-user
  - variable: AGROAPP_PASSWORD
    secret: projects/smartcow-c22fb/secrets/agroapp-password

  # ── Firebase Admin SDK ──
  - variable: FIREBASE_CLIENT_EMAIL
    secret: projects/smartcow-c22fb/secrets/firebase-client-email
  - variable: FIREBASE_PRIVATE_KEY
    secret: projects/smartcow-c22fb/secrets/firebase-private-key

  # ── Observabilidad ──
  - variable: SENTRY_DSN
    secret: projects/smartcow-c22fb/secrets/sentry-dsn-web

  # ── GCP ──
  - variable: GCP_PROJECT_ID
    value: smartcow-c22fb

  # ── Firebase Client SDK (públicas, browser-safe) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBbpjCH2Vu0Tx0etlRxeIp7i5d_JpjiY04
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: smartcow-c22fb.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: smartcow-c22fb
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "588259089189"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:588259089189:web:6de0ad96e17e1a203118cc"
    availability:
      - BUILD
      - RUNTIME
